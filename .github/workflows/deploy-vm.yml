# Optional: push-to-main deploy over SSH. Enable with repo Variable ENABLE_VPS_DEPLOY=true
# Secrets: VPS_HOST, VPS_USER, VPS_SSH_PRIVATE_KEY
# Optional Variable: VPS_APP_PATH (default /root/block-miner)
name: Deploy VPS

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      vars.ENABLE_VPS_DEPLOY == 'true' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_ROOT="${{ vars.VPS_APP_PATH }}"
            APP_ROOT="${APP_ROOT:-/root/block-miner}"
            export APP_ROOT GIT_BRANCH=main
            cd "$APP_ROOT"
            bash scripts/deploy-production-safe.sh
