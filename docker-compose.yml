version: '3.8'

# support-block-miner — painel admin independente do container principal
# Em produção: configure DATABASE_URL no .env.production apontando para o DB real
# Em teste: use o serviço postgres local abaixo

services:
  db:
    image: postgres:15-alpine
    container_name: support-db
    environment:
      POSTGRES_USER: blockminer
      POSTGRES_PASSWORD: blockminer_password
      POSTGRES_DB: blockminer_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  support:
    build: .
    container_name: support-block-miner
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      - db
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3001
      UPLOADS_DIR: /app/uploads
      # DATABASE_URL vem do .env.production — deve apontar para o DB real de produção
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./uploads:/app/uploads
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - support
    restart: unless-stopped

volumes:
  postgres_data:


