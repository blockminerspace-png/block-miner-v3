services:
  app:
    build: .
    ports:
      - "127.0.0.1:3000:3000"

    env_file:
      - .env

    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /app/data/blockminer.db
      BACKUP_DIR: /app/backups
      BACKUP_RETENTION_DAYS: 7
      BACKUP_INTERVAL_HOURS: 24
      # Override these via .env if using cloud backup
      BACKUP_CLOUD_ENABLED: ${BACKUP_CLOUD_ENABLED:-false}
      BACKUP_CLOUD_REMOTE: ${BACKUP_CLOUD_REMOTE:-}

    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - /root/.config/rclone:/root/.config/rclone:ro

    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    restart: unless-stopped
