<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlockMiner | Logs</title>
    <link rel="stylesheet" href="/admin/styles.css" />
  </head>
  <body>
    <main class="admin-app logs-page">
      <header class="admin-header">
        <div>
          <h1>Logs Monitor</h1>
          <p>Inspect audit, critical, general, security and transactions logs with filters and error-peak charts.</p>
        </div>
        <div style="display: flex; align-items: center; gap: 0.6rem;">
          <a class="btn" href="/admin/index.html">Back to Admin</a>
          <button class="btn" id="refreshButton" type="button">Refresh</button>
        </div>
      </header>

      <section class="card">
        <div class="table-header">
          <h2>Filters</h2>
          <span id="statusMessage" class="status"></span>
        </div>
        <form id="filtersForm" class="form-grid logs-filters-grid">
          <label>
            Categories (Ctrl/Cmd for multi-select)
            <select id="categoriesInput" multiple size="5">
              <option value="audit" selected>audit</option>
              <option value="critical" selected>critical</option>
              <option value="general" selected>general</option>
              <option value="security" selected>security</option>
              <option value="transactions" selected>transactions</option>
            </select>
          </label>

          <label>
            Levels (Ctrl/Cmd for multi-select)
            <select id="levelsInput" multiple size="4">
              <option value="ERROR" selected>ERROR</option>
              <option value="WARN" selected>WARN</option>
              <option value="INFO" selected>INFO</option>
              <option value="DEBUG">DEBUG</option>
            </select>
          </label>

          <label>
            Search text
            <input id="searchInput" type="text" placeholder="ip, user, endpoint, error..." />
          </label>

          <label>
            From
            <input id="fromInput" type="datetime-local" />
          </label>

          <label>
            To
            <input id="toInput" type="datetime-local" />
          </label>

          <label>
            Bucket (minutes)
            <select id="bucketInput">
              <option value="5">5</option>
              <option value="15" selected>15</option>
              <option value="30">30</option>
              <option value="60">60</option>
            </select>
          </label>

          <label>
            Page size
            <select id="pageSizeInput">
              <option value="25">25</option>
              <option value="50" selected>50</option>
              <option value="100">100</option>
            </select>
          </label>

          <div class="logs-filters-actions" style="display: flex; align-items: end; gap: 0.6rem;">
            <button class="btn primary" type="submit">Apply</button>
            <button class="btn" id="resetFiltersButton" type="button">Reset</button>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="table-header">
          <h2>Summary</h2>
          <span id="summaryInfo" class="status"></span>
        </div>
        <div id="statsGrid" class="stats-grid"></div>
      </section>

      <section class="card">
        <div class="table-header">
          <h2>Error Spike Charts</h2>
          <span id="chartInfo" class="status"></span>
        </div>

        <div class="charts-grid">
          <article class="chart-card">
            <div class="chart-header">
              <h3>Errors per bucket</h3>
              <span id="errorsCurrent" class="chart-current">--</span>
            </div>
            <svg id="errorsChart" class="chart-svg" viewBox="0 0 420 150" preserveAspectRatio="none" aria-label="Errors by bucket"></svg>
            <div id="errorsMeta" class="chart-meta">--</div>
          </article>

          <article class="chart-card">
            <div class="chart-header">
              <h3>Warnings per bucket</h3>
              <span id="warningsCurrent" class="chart-current">--</span>
            </div>
            <svg id="warningsChart" class="chart-svg" viewBox="0 0 420 150" preserveAspectRatio="none" aria-label="Warnings by bucket"></svg>
            <div id="warningsMeta" class="chart-meta">--</div>
          </article>
        </div>
      </section>

      <section class="card">
        <div class="table-header">
          <h2>Events</h2>
          <div style="display: flex; align-items: center; gap: 0.5rem;">
            <button class="btn small" id="prevPageButton" type="button">Prev</button>
            <span id="pageInfo" class="status"></span>
            <button class="btn small" id="nextPageButton" type="button">Next</button>
          </div>
        </div>

        <div class="table-wrapper">
          <table class="table-compact logs-events-table">
            <thead>
              <tr>
                <th>When</th>
                <th>Category</th>
                <th>Level</th>
                <th>Module</th>
                <th>Message</th>
                <th>Details</th>
                <th>File</th>
              </tr>
            </thead>
            <tbody id="eventsTable"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/admin/logs.js"></script>
  </body>
</html>
